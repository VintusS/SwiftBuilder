included:
  - SwiftBuilder
  - PreviewRunner

excluded:
  - build
  - DerivedData
  - .build
  - SwiftBuilder.xcodeproj
  - PreviewRunner/Assets.xcassets/SwiftBuilderGeneratedAppIcon.appiconset

reporter: xcode

disabled_rules:
  - trailing_whitespace
  - todo

line_length:
  warning: 160
  error: 240
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 800
  error: 1200

type_body_length:
  warning: 500
  error: 800

function_body_length:
  warning: 120
  error: 200

cyclomatic_complexity:
  warning: 15
  error: 25

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - x
    - y
    - i
